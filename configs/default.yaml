seed: 42

court:
  preset: football_7v7
  cell_size_m: 1.0

blf:
  source: gaussian
  gaussians:
    - center: [55.0, 8.0]
      sigma: [8.0, 5.0]
      amplitude: 1.0
    - center: [55.0, 32.0]
      sigma: [8.0, 5.0]
      amplitude: 0.85
    - center: [8.0, 20.0]
      sigma: [6.0, 10.0]
      amplitude: 0.7
  normalize: true

balls:
  count: 40
  mode: blf
  min_separation_m: 1.5

robots:
  speed_mps: 0.8
  pickup_radius_m: 0.4
  counts: [1, 2, 4]

simulation:
  dt_s: 0.1
  max_time_s: 600.0
  coverage_threshold: 0.95

deployment:
  mode: uniform

players:
  enabled: false

cvar:
  enabled: false

methods:
  - single_greedy
  - multi_greedy
  - hungarian_assignment
  - voronoi_assignment
  - blf_informed_deployment

output:
  figures_dir: outputs/figures
  results_dir: outputs/results
  dpi: 150
